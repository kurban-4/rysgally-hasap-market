name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            php-binary: php-aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            php-binary: php-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1. Используем PHP 8.4, чтобы соответствовать твоему composer.lock
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, zip, fileinfo  # Добавили fileinfo
          tools: composer:v2

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      # Универсальный способ создания папки для Mac и Windows
      - name: Create binaries directory
        shell: bash
        run: mkdir -p src-tauri/binaries

      # Подготовка Sidecar для macOS
      - name: Prepare Sidecar Binary (macOS)
        if: matrix.os == 'macos-latest'
        run: cp $(which php) src-tauri/binaries/${{ matrix.php-binary }}

      # Подготовка Sidecar для Windows (без повторного mkdir)
      # 4. Подготовка Sidecar бинарника (Windows)
      - name: Prepare Sidecar Binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $phpPath = (Get-Command php).Source
          Copy-Item $phpPath -Destination "src-tauri/binaries/${{ matrix.php-binary }}"

      - name: Install Composer dependencies
        run: |
          cd src-tauri/resources/rysgally-hasap-market
          composer install --no-dev --optimize-autoloader --ignore-platform-reqs
      # Создаем временный .env, чтобы Tauri не падал при сборке
      - name: Create temporary .env
        shell: bash
        run: |
          cd src-tauri/resources/rysgally-hasap-market
          if [ ! -f .env ]; then
            cp .env.example .env || touch .env
          fi
      # 6. Твой хак для обхода отсутствующего PDO MySQL
      - name: Fix Pdo\Mysql issue
        shell: bash
        run: |
          CONFIG="src-tauri/resources/rysgally-hasap-market/config/database.php"
          CONNECTOR="src-tauri/resources/rysgally-hasap-market/vendor/laravel/framework/src/Illuminate/Database/Connectors/MySqlConnector.php"
          for FILE in "$CONFIG" "$CONNECTOR"; do
            if [ -f "$FILE" ]; then
              sed -i 's/PDO::MYSQL_ATTR_SSL_CA/1009/g' "$FILE" || sed -i '' 's/PDO::MYSQL_ATTR_SSL_CA/1009/g' "$FILE"
            fi
          done

      - name: Clean Install
        shell: bash
        run: |
          rm -f package-lock.json
          npm install
          cd src-tauri
          cargo fetch

      - name: Build App
        shell: bash
        run: |
          npm run build
          npx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rysgally-hasap-market-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/macos/*.dmg
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}